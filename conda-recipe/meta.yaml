{% set name = "mom6-diag-tool" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - mom6-diag-tool = mom6_diag_tool.cli.main:main

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=45
    - wheel
  run:
    - python >=3.8
    - pandas >=1.3.0
    - ipywidgets >=7.6.0
    - ipython >=7.16.0

test:
  imports:
    - mom6_diag_tool
    - mom6_diag_tool.core
    - mom6_diag_tool.ui
    - mom6_diag_tool.cli
  commands:
    - mom6-diag-tool --help

about:
  home: https://github.com/yourusername/CESM-diags-generator
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A tool for creating MOM6 diag_table files from available_diags output
  description: |
    MOM6 Diagnostic Table Generator is an interactive tool that helps create
    properly formatted diag_table files for the MOM6 ocean model. It parses
    MOM6's available_diags output and provides both a Jupyter notebook interface
    and command-line tools for selecting and configuring diagnostic outputs.
  doc_url: https://github.com/yourusername/CESM-diags-generator
  dev_url: https://github.com/yourusername/CESM-diags-generator

extra:
  recipe-maintainers:
    - yourusername
